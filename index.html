<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Etiket Analizi & İçerik Üretici</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f0;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
    }

    h1 {
      font-size: 22px;
      font-weight: 500;
      margin-bottom: 1.5rem;
      color: #1a1a1a;
    }

    .card {
      background: #ffffff;
      border: 0.5px solid rgba(0,0,0,0.15);
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .section-title {
      font-size: 15px;
      font-weight: 500;
      color: #1a1a1a;
      margin-bottom: 12px;
    }

    .label {
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
      display: block;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    input[type="text"],
    input[type="password"],
    input[type="number"] {
      width: 100%;
      padding: 8px 12px;
      border: 0.5px solid rgba(0,0,0,0.2);
      border-radius: 8px;
      font-size: 14px;
      color: #1a1a1a;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus {
      border-color: rgba(0,0,0,0.4);
    }

    .divider {
      border: none;
      border-top: 0.5px solid rgba(0,0,0,0.1);
      margin: 1rem 0;
    }

    .btn-primary {
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
      margin-top: 4px;
      transition: opacity 0.15s;
    }

    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    .status {
      font-size: 13px;
      color: #666;
      margin-top: 8px;
      min-height: 20px;
    }

    .status.error { color: #c0392b; }

    .step-label {
      font-size: 12px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }

    .tag-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }

    .tag {
      background: #f5f5f0;
      border: 0.5px solid rgba(0,0,0,0.12);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 13px;
      color: #1a1a1a;
    }

    .tag .count {
      color: #999;
      font-size: 11px;
      margin-left: 4px;
    }

    .output-text {
      font-size: 14px;
      line-height: 1.7;
      color: #1a1a1a;
      white-space: pre-wrap;
    }

    .hidden { display: none; }

    @media (max-width: 480px) {
      .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>YouTube Etiket Analizi & İçerik Üretici</h1>

  <div class="card">
    <p class="section-title">API ayarları</p>
    <div class="row">
      <div>
        <span class="label">YouTube API key</span>
        <input type="password" id="yt-key" placeholder="AIza..." />
      </div>
      <div>
        <span class="label">Claude API key</span>
        <input type="password" id="claude-key" placeholder="sk-ant-..." />
      </div>
    </div>

    <hr class="divider" />

    <p class="section-title">Analiz ayarları</p>
    <div class="row">
      <div>
        <span class="label">Arama konusu</span>
        <input type="text" id="topic" value="futbol" />
      </div>
      <div>
        <span class="label">Video sayısı</span>
        <input type="number" id="video-count" value="20" min="5" max="50" />
      </div>
    </div>

    <button class="btn-primary" id="run-btn" onclick="runAnalysis()">Analizi başlat</button>
    <p class="status" id="status"></p>
  </div>

  <div class="card hidden" id="tags-card">
    <p class="step-label">Adım 1 — en popüler etiketler</p>
    <div class="tag-grid" id="tags-output"></div>
  </div>

  <div class="card hidden" id="content-card">
    <p class="step-label">Adım 2 — üretilen içerik</p>
    <p class="output-text" id="content-output"></p>
  </div>
</div>

<script>
async function runAnalysis() {
  const ytKey = document.getElementById('yt-key').value.trim();
  const claudeKey = document.getElementById('claude-key').value.trim();
  const topic = document.getElementById('topic').value.trim();
  const videoCount = parseInt(document.getElementById('video-count').value) || 20;
  const btn = document.getElementById('run-btn');
  const status = document.getElementById('status');

  status.className = 'status';

  if (!ytKey || !claudeKey || !topic) {
    status.textContent = 'Lütfen tüm alanları doldur.';
    return;
  }

  btn.disabled = true;
  document.getElementById('tags-card').classList.add('hidden');
  document.getElementById('content-card').classList.add('hidden');

  try {
    // 1. YouTube arama
    status.textContent = 'YouTube videoları aranıyor...';
    const searchRes = await fetch(
      `https://www.googleapis.com/youtube/v3/search?part=id,snippet&q=${encodeURIComponent(topic)}&maxResults=${videoCount}&order=viewCount&type=video&relevanceLanguage=tr&key=${ytKey}`
    );
    const searchData = await searchRes.json();
    if (searchData.error) throw new Error(searchData.error.message);

    const videoIds = searchData.items.map(i => i.id.videoId).filter(Boolean);
    if (videoIds.length === 0) throw new Error('Video bulunamadı.');

    // 2. Video detayları ve etiketler
    status.textContent = `${videoIds.length} video bulundu. Etiketler çekiliyor...`;
    const detailRes = await fetch(
      `https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${videoIds.join(',')}&key=${ytKey}`
    );
    const detailData = await detailRes.json();
    if (detailData.error) throw new Error(detailData.error.message);

    const tagCount = {};
    for (const video of detailData.items) {
      const snippet = video.snippet || {};
      const tags = snippet.tags || [];
      const text = (snippet.title || '') + ' ' + (snippet.description || '');
      const hashTags = (text.match(/#(\w+)/g) || []).map(h => h.slice(1));
      for (const t of [...tags, ...hashTags]) {
        const key = t.toLowerCase();
        tagCount[key] = (tagCount[key] || 0) + 1;
      }
    }

    const sorted = Object.entries(tagCount)
      .sort((a, b) => b[1] - a[1])
      .slice(0, 20);

    // 3. Etiketleri göster
    const tagsOutput = document.getElementById('tags-output');
    tagsOutput.innerHTML = '';
    for (const [tag, count] of sorted) {
      const el = document.createElement('span');
      el.className = 'tag';
      el.innerHTML = `#${tag}<span class="count">${count}</span>`;
      tagsOutput.appendChild(el);
    }
    document.getElementById('tags-card').classList.remove('hidden');

    // 4. Claude ile içerik üret
    status.textContent = 'İçerik üretiliyor...';
    const tagList = sorted.map(([t]) => '#' + t).join(' ');

    const claudeRes = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': claudeKey,
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 1000,
        system: 'Sen bir sosyal medya içerik üreticisisin. Her istekte sadece verilen etiketleri kullan, önceki konularla bağlantı kurma. Her içerik tamamen bağımsız olsun.',
        messages: [{
          role: 'user',
          content: `Konu: ${topic}\n\nAşağıdaki etiketler bu konudaki en popüler YouTube videolarından çıkarıldı:\n\n${tagList}\n\nSADECE bu etiketleri ve bu konuyu kullanarak Instagram veya YouTube için Türkçe, enerjik ve ilgi çekici bir sosyal medya paylaşım metni yaz. Metin 150-200 kelime arasında olsun. Etiketleri metnin sonuna ekle.`
        }]
      })
    });

    const claudeData = await claudeRes.json();
    if (claudeData.error) throw new Error(claudeData.error.message);

    const content = claudeData.content?.[0]?.text || 'İçerik üretilemedi.';
    document.getElementById('content-output').textContent = content;
    document.getElementById('content-card').classList.remove('hidden');
    status.textContent = 'Tamamlandı!';

  } catch (err) {
    status.className = 'status error';
    status.textContent = 'Hata: ' + err.message;
  } finally {
    btn.disabled = false;
  }
}
</script>

</body>
</html>
